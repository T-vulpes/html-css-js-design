<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic MacOS Dock</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.15), transparent 25%);
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        .dock-container {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 15px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: padding 0.2s;
        }

        .dock-item {
            position: relative; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: scale(var(--scale, 1)) translateY(calc((1 - var(--scale, 1)) * 15px));
            transition: transform 0.1s;
        }

        .dock-item span { pointer-events: none; }

        .dock-item.bounce { animation: bounce 0.5s cubic-bezier(0.25, 1, 0.5, 1); }

        @keyframes bounce {
            0% { transform: scale(var(--scale)) translateY(calc((1 - var(--scale)) * 15px)); }
            50% { transform: scale(var(--scale)) translateY(calc((1 - var(--scale)) * 15px - 20px)); }
            100% { transform: scale(var(--scale)) translateY(calc((1 - var(--scale)) * 15px)); }
        }

        .tooltip {
            position: absolute; top: -45px; background: rgba(0, 0, 0, 0.7);
            color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem;
            font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s; transform: translateY(10px);
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
        }

        .dock-item:hover .tooltip { opacity: 1; transform: translateY(0); }

        .dock-item::after {
            content: ''; position: absolute; bottom: -6px; width: 4px; height: 4px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.4); opacity: 0;
        }
        .dock-item.active::after { opacity: 1; }

    </style>
</head>
<body>

    <div class="dock-container" id="dock">
        <div class="dock-item" data-title="Finder"><span>🧭</span><div class="tooltip">Finder</div></div>
        <div class="dock-item active" data-title="Messages"><span>💬</span><div class="tooltip">Messages</div></div>
        <div class="dock-item" data-title="Mail"><span>📬</span><div class="tooltip">Mail</div></div>
        <div class="dock-item active" data-title="Maps"><span>🗺️</span><div class="tooltip">Maps</div></div>
        <div class="dock-item" data-title="Photos"><span>🖼️</span><div class="tooltip">Photos</div></div>
        <div class="dock-item" data-title="Settings"><span>⚙️</span><div class="tooltip">Settings</div></div>
    </div>

    <script>
        const dock = document.getElementById('dock');
        const items = document.querySelectorAll('.dock-item');
        
        const maxScale = 1.8;
        const range = 150;

        dock.addEventListener('mousemove', (e) => {
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const distance = Math.abs(e.clientX - centerX);

                let scale = 1;

                if (distance < range) {
                    scale = 1 + (maxScale - 1) * (1 - distance / range);
                }

                item.style.setProperty('--scale', scale);
                item.style.transition = 'none';
            });
        });

        dock.addEventListener('mouseleave', () => {
            items.forEach(item => {
                item.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                item.style.setProperty('--scale', 1);
            });
        });

        items.forEach(item => {
            item.addEventListener('click', () => {
                item.classList.add('bounce');
                setTimeout(() => item.classList.remove('bounce'), 500);
                
                items.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
