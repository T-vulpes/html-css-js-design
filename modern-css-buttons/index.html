<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Premium Button Collection</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background-color: #030305; 
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #030305 80%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 45px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 50px 0;
        }

        .btn-aurora {
            position: relative;
            padding: 16px 45px;
            background: rgba(10, 10, 15, 0.4);
            border-radius: 100px;
            color: #fff; font-size: 1rem; font-weight: 600; letter-spacing: 2px;
            cursor: pointer; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
            z-index: 1;
        }

        .btn-aurora::before {
            content: ''; position: absolute; inset: -5px; z-index: -1;
            background: conic-gradient(from 0deg, #ff0055, #00f3ff, #e2ff00, #ff0055);
            animation: spinAurora 4s linear infinite;
            opacity: 0.3; transition: opacity 0.4s ease;
            filter: blur(10px);
        }

        .btn-aurora:hover { transform: translateY(-3px) scale(1.02); }
        .btn-aurora:hover::before { opacity: 0.8; }

        @keyframes spinAurora { 100% { transform: rotate(360deg); } }

        .btn-oldmoney {
            padding: 15px 50px;
            background-color: #0a0a0a;
            border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 4px;
            color: #d4af37; font-size: 0.95rem; font-weight: 400;
            font-family: "Georgia", serif; 
            letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-oldmoney:hover {
            background-color: #d4af37; color: #000;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
            border-color: #d4af37; transform: translateY(-2px);
        }

        .btn-obsidian {
            padding: 18px 45px;
            background: #111216; 
            border: none; border-radius: 50px;
            color: #64748b; font-size: 1.05rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer;
            box-shadow: 6px 6px 14px #070709, -6px -6px 14px #1b1d23;
            transition: all 0.3s ease;
        }

        .btn-obsidian:hover { color: #fff; }

        .btn-obsidian:active {
            box-shadow: inset 6px 6px 10px #070709, inset -6px -6px 10px #1b1d23;
            color: #38bdf8;
        }

        .btn-titanium {
            padding: 16px 50px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 50%, #2a2a2a 100%);
            background-size: 200% 200%;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff; font-size: 1rem; font-weight: 800;
            letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.8);
            transition: all 0.4s ease;
        }

        .btn-titanium:hover {
            background-position: 100% 100%;
            border-color: #555;
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.2), 0 15px 30px rgba(0,0,0,0.9);
            transform: translateY(-3px);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .btn-plasma {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 50px;
            color: transparent; font-size: 1.1rem; font-weight: 900;
            -webkit-text-stroke: 1px rgba(0, 243, 255, 0.6);
            letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-plasma::before {
            content: ''; position: absolute; inset: 0; z-index: -1;
            background: #00f3ff;
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-plasma:hover {
            color: #000; 
            -webkit-text-stroke: 0;
            border-color: #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
            transform: scale(1.05);
        }
        
        .btn-plasma:hover::before { transform: scaleX(1); }
    </style>
</head>
<body>

    <button class="btn-aurora">Aurora Glass</button>
    <button class="btn-oldmoney">Heritage Gold</button>
    <button class="btn-obsidian">Dark Matter</button>
    <button class="btn-titanium">Liquid Titanium</button>
    <button class="btn-plasma">Neon Plasma</button>

</body>
</html>
