<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Animated Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <div class="panel active" style="background-image: url('https://images.unsplash.com/photo-1554902843-260acd0993f8?q=80&w=2000&auto=format&fit=crop');">
            <div class="panel-content">
                <div class="icon-box"><i class="fa-solid fa-meteor"></i></div>
                <div class="text-info">
                    <h3>Cyberpunk City</h3>
                    <p>Tokyo, Japan - The neon future.</p>
                </div>
            </div>
        </div>
        <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');">
            <div class="panel-content">
                <div class="icon-box"><i class="fa-solid fa-city"></i></div>
                <div class="text-info">
                    <h3>Urban Concrete</h3>
                    <p>Chicago, USA - The architecture.</p>
                </div>
            </div>
        </div>
        <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2000&auto=format&fit=crop');">
            <div class="panel-content">
                <div class="icon-box"><i class="fa-solid fa-bolt"></i></div>
                <div class="text-info">
                    <h3>Neon Vibes</h3>
                    <p>Hong Kong - Nights never sleep.</p>
                </div>
            </div>
        </div>
        <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1480796927426-f609979314bd?q=80&w=2000&auto=format&fit=crop');">
            <div class="panel-content">
                <div class="icon-box"><i class="fa-solid fa-plane"></i></div>
                <div class="text-info">
                    <h3>Mount Fuji</h3>
                    <p>Japan - The silent giant.</p>
                </div>
            </div>
        </div>
        <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1533613220915-609f661a6fe1?q=80&w=2000&auto=format&fit=crop');">
            <div class="panel-content">
                <div class="icon-box"><i class="fa-solid fa-car-side"></i></div>
                <div class="text-info">
                    <h3>Night Drift</h3>
                    <p>Seoul, Korea - The fast lane.</p>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
