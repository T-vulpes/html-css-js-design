<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Text Scramble</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background-color: #030712;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.05), transparent 25%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace; /* Hacker hissi için monospace font */
            overflow: hidden;
        }

        .container {
            display: flex; flex-direction: column; gap: 40px;
        }

        .scramble-text {
            color: #fff;
            font-size: 4rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px;
            margin: 0; padding: 10px 20px;
            cursor: pointer; position: relative;
            /* Fütüristik Neon Gölge */
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .scramble-text.flutter:hover {
            color: #38bdf8; text-shadow: 0 0 30px rgba(56, 189, 248, 0.8);
        }

        .scramble-text.python:hover {
            color: #e2ff00; text-shadow: 0 0 30px rgba(226, 255, 0, 0.8);
        }
        
        .scramble-text.youtube:hover {
            color: #ff0055; text-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
        }

        .scramble-text::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 2; opacity: 0.5;
        }

        .subtitle {
            color: #666; font-size: 1rem; text-align: center;
            letter-spacing: 2px; text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin-top: -20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="scramble-text flutter" data-value="FLUTTER DEVELOPER">FLUTTER DEVELOPER</h1>
        <h1 class="scramble-text python" data-value="PYTHON EXPERT">PYTHON EXPERT</h1>
        <h1 class="scramble-text youtube" data-value="CONTENT CREATOR">CONTENT CREATOR</h1>
    </div>

    <div class="subtitle">Hover to decrypt data</div>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";

        const textElements = document.querySelectorAll('.scramble-text');

        textElements.forEach(element => {
            element.addEventListener('mouseover', event => {
                let iterations = 0;
                
                clearInterval(element.dataset.interval);

                element.dataset.interval = setInterval(() => {
                    event.target.innerText = event.target.innerText
                        .split("")
                        .map((letter, index) => {
                            if(index < iterations) {
                                return event.target.dataset.value[index];
                            }
                            return letters[Math.floor(Math.random() * 26)];
                        })
                        .join("");
                    
                    if(iterations >= event.target.dataset.value.length){ 
                        clearInterval(element.dataset.interval);
                    }
                    
                    iterations += 1 / 3;
                }, 30);
            });
        });
    </script>
</body>
</html>
