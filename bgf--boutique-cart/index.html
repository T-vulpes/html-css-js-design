<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Boutique - Techspark</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand">NOVA.</div>
        <div class="cart-icon" id="cart-btn">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <main class="products-grid" id="products-container"></main>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>My Cart</h2>
            <button id="close-cart"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="cart-items" id="cart-items">
        </div>

        <div class="cart-footer">
            <div class="total">Total: <span id="total-price">0</span> $</div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
