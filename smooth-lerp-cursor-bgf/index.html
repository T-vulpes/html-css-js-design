<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Button & Smooth Cursor</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background-color: #050505; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: none;
        }

        .bg-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap; pointer-events: none;
            letter-spacing: -5px; user-select: none;
        }

        .cursor {
            position: fixed; top: 0; left: 0;
            width: 15px; height: 15px; background: #fff;
            border-radius: 50%; pointer-events: none;
            z-index: 9999; mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, width, height;
        }

        .cursor.hovered {
            width: 100px; height: 100px;
            background: #fff;
        }

        .magnetic-wrapper {
            padding: 50px;
        }

        .magnetic-btn {
            position: relative; width: 180px; height: 180px;
            background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: none; outline: none; cursor: none;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .btn-text {
            color: #050505; font-size: 1.1rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>

    <div class="bg-text">AGENCY</div>

    <div class="magnetic-wrapper" id="magneticWrapper">
        <button class="magnetic-btn" id="magneticBtn">
            <span class="btn-text" id="btnText">Explore</span>
        </button>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const magneticWrapper = document.getElementById('magneticWrapper');
        const magneticBtn = document.getElementById('magneticBtn');
        const btnText = document.getElementById('btnText');

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            
            cursor.style.transform = `translate(calc(${cursorX}px - 50%), calc(${cursorY}px - 50%))`;
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        magneticBtn.addEventListener('mousemove', (e) => {
            const rect = magneticBtn.getBoundingClientRect();
            
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const distanceX = e.clientX - centerX;
            const distanceY = e.clientY - centerY;

            magneticBtn.style.transform = `translate(${distanceX * 0.4}px, ${distanceY * 0.4}px)`;
            btnText.style.transform = `translate(${distanceX * 0.2}px, ${distanceY * 0.2}px)`;
        });

        magneticBtn.addEventListener('mouseenter', () => {
            cursor.classList.add('hovered');
            magneticBtn.style.transition = 'none';
            btnText.style.transition = 'none';
        });

        magneticBtn.addEventListener('mouseleave', () => {
            cursor.classList.remove('hovered');
            
            magneticBtn.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            btnText.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            
            magneticBtn.style.transform = `translate(0px, 0px)`;
            btnText.style.transform = `translate(0px, 0px)`;
        });
    </script>
</body>
</html>
