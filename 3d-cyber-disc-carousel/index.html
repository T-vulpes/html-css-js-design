<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cybernetic Disc Carousel</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #050505 90%);
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; perspective: 1200px;
            user-select: none; touch-action: none;
        }

        .portal-loader {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle, #050505 20%, transparent 80%);
            display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 1s ease-out;
            pointer-events: none;
        }

        .loader-ring {
            width: 70px; height: 70px;
            border: 3px solid #fff; border-radius: 50%;
            border-top-color: #ff0055; border-right-color: #00eeff; border-bottom-color: #e2ff00;
            animation: ringSpin 1.5s linear infinite;
        }

        @keyframes ringSpin { to { transform: rotate(360deg); } }

        .scene {
            position: relative; 
            width: 220px; 
            height: 220px; 
            transform-style: preserve-3d;
            transform: rotateX(-10deg);
        }

        .carousel {
            position: absolute; inset: 0;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card {
            position: absolute; inset: 0;
            background: rgba(10, 10, 15, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%; 
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 12px rgba(255,255,255,0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            -webkit-box-reflect: below 25px linear-gradient(transparent 65%, rgba(0,0,0,0.25));
        }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; inset: 0; z-index: 1;
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), filter 0.6s;
        }

        .card:hover img {
            transform: scale(1.1);
            filter: blur(6px) brightness(30%);
        }

        .card-info {
            position: absolute; inset: 0;
            padding: 20px; box-sizing: border-box;
            z-index: 5; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            border-radius: 50%;
            opacity: 0; transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.4s ease;
        }

        .card:hover .card-info {
            transform: scale(1); opacity: 1;
        }

        .card-title {
            color: #fff; font-size: 1rem; font-weight: 900;
            margin: 0 0 8px 0; letter-spacing: -0.5px; text-transform: uppercase;
        }

        .card-tech-wrapper {
            display: flex; gap: 4px; justify-content: center; flex-wrap: wrap;
            max-width: 90%;
        }

        .tech-badge {
            font-size: 0.55rem; font-weight: 800; color: #fff;
            padding: 3px 6px; border-radius: 50px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tech-cyan { background: rgba(0, 238, 255, 0.1); color: #00eeff; border: 1px solid rgba(0, 238, 255, 0.3); }
        .tech-purple { background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .tech-pink { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3); }
        .card:nth-child(1) { transform: rotateY(0deg) translateZ(260px); }
        .card:nth-child(2) { transform: rotateY(45deg) translateZ(260px); }
        .card:nth-child(3) { transform: rotateY(90deg) translateZ(260px); }
        .card:nth-child(4) { transform: rotateY(135deg) translateZ(260px); }
        .card:nth-child(5) { transform: rotateY(180deg) translateZ(260px); }
        .card:nth-child(6) { transform: rotateY(225deg) translateZ(240px); }
        .card:nth-child(7) { transform: rotateY(270deg) translateZ(260px); }
        .card:nth-child(8) { transform: rotateY(315deg) translateZ(260px); }
    </style>
</head>
<body>

    <div class="portal-loader" id="portalLoader">
        <div class="loader-ring"></div>
    </div>

    <div class="scene">
        <div class="carousel" id="carousel">
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" alt="Web3">
                <div class="card-info">
                    <h3 class="card-title">Nexus Pay</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-cyan">Web3</span>
                        <span class="tech-badge tech-cyan">Crypto</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&w=600&q=80" alt="AI">
                <div class="card-info">
                    <h3 class="card-title">Aura AI</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-purple">ML</span>
                        <span class="tech-badge tech-purple">Python</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=600&q=80" alt="E-Commerce">
                <div class="card-info">
                    <h3 class="card-title">Nova Store</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-pink">Next.js</span>
                        <span class="tech-badge tech-pink">SaaS</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=600&q=80" alt="3D">
                <div class="card-info">
                    <h3 class="card-title">Echo VR</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-cyan">WebGL</span>
                        <span class="tech-badge tech-cyan">3D</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80" alt="Fintech">
                <div class="card-info">
                    <h3 class="card-title">Zenith</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-purple">React</span>
                        <span class="tech-badge tech-purple">Node</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=600&q=80" alt="Agency">
                <div class="card-info">
                    <h3 class="card-title">Lumina</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-pink">Design</span>
                        <span class="tech-badge tech-pink">GSAP</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&w=600&q=80" alt="Mobile">
                <div class="card-info">
                    <h3 class="card-title">Vortex</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-cyan">iOS</span>
                        <span class="tech-badge tech-cyan">Swift</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=600&q=80" alt="Data">
                <div class="card-info">
                    <h3 class="card-title">Metrics</h3>
                    <div class="card-tech-wrapper">
                        <span class="tech-badge tech-purple">Data</span>
                        <span class="tech-badge tech-purple">D3.js</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const loader = document.getElementById('portalLoader');
        const carousel = document.getElementById('carousel');
        const cards = document.querySelectorAll('.card');        
        let isDragging = false;
        let startX = 0;
        let currentRotation = 0;
        let targetRotation = 0;
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.style.opacity = '0';                
                cards.forEach((card, index) => {
                    card.animate([
                        { opacity: 0, transform: `rotateY(${index * 45}deg) translateZ(500px) scale(0.5)` },
                        { opacity: 1, transform: `rotateY(${index * 45}deg) translateZ(260px) scale(1)` }
                    ], {
                        duration: 1200,
                        delay: index * 100,
                        easing: 'cubic-bezier(0.2, 1, 0.3, 1)',
                        fill: 'both'
                    });
                });
            }, 500);
        });

        window.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            document.body.style.cursor = 'grabbing';
            carousel.style.transition = 'none';
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            targetRotation += deltaX * 0.35; 
            startX = e.clientX;
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            document.body.style.cursor = 'default';
        });

        function animate() {
            currentRotation += (targetRotation - currentRotation) * 0.08; 
            targetRotation *= 0.98;             
            carousel.style.transform = `rotateY(${currentRotation}deg)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
